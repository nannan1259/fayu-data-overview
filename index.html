<html lang="zh-CN">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>法域智和数据情况总览</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
    background: #f0f2f5;
    color: #333;
    padding: 12px;
    min-height: 100vh;
    -webkit-text-size-adjust: 100%;
  }

  .page-wrapper {
    max-width: 1300px;
    margin: 0 auto;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .header {
    background: linear-gradient(135deg, #1a3c6e 0%, #2d6bb0 100%);
    color: white;
    padding: 24px 20px 18px;
    text-align: center;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    margin: 0 auto 12px;
    max-width: 800px;
  }
  .header .subtitle {
    font-size: 12px;
    opacity: 0.75;
    margin-bottom: 14px;
  }

  /* 版本选择器 */
  .version-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .version-bar .ver-label {
    font-size: 12px;
    opacity: 0.7;
    white-space: nowrap;
  }
  .version-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 20px;
    background: transparent;
    color: rgba(255,255,255,0.75);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.25s;
    white-space: nowrap;
    font-family: inherit;
  }
  .version-btn:hover {
    border-color: rgba(255,255,255,0.7);
    color: #fff;
    background: rgba(255,255,255,0.1);
  }
  .version-btn.active {
    background: rgba(255,255,255,0.22);
    border-color: #fff;
    color: #fff;
    font-weight: 600;
    box-shadow: 0 0 8px rgba(255,255,255,0.2);
  }
  .version-btn .ver-badge {
    font-size: 10px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    padding: 1px 7px;
    line-height: 1.4;
  }
  .version-btn.active .ver-badge {
    background: rgba(255,255,255,0.35);
  }
  .version-btn .ver-date {
    font-size: 10px;
    opacity: 0.65;
  }
  .version-btn.active .ver-date {
    opacity: 0.9;
  }

  .content { padding: 20px 16px; }

  /* 汇总卡片 */
  .summary-cards {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }
  .card {
    text-align: center;
    padding: 16px 8px;
    border-radius: 10px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .card-blue  { background: #EBF5FB; } .card-blue::before  { background: #4472C4; }
  .card-orange{ background: #FDEBD0; } .card-orange::before{ background: #ED7D31; }
  .card-purple{ background: #EDE8FC; } .card-purple::before{ background: #7B68EE; }
  .card-teal  { background: #D5F5E3; } .card-teal::before  { background: #26A65B; }
  .card-gold  { background: #FEF9E7; } .card-gold::before  { background: #FFC000; }
  .card-green { background: #EAFAF1; } .card-green::before { background: #70AD47; }
  .card .label { font-size: 12px; color: #555; margin-bottom: 6px; line-height: 1.4; }
  .card .value { font-size: 26px; font-weight: 700; color: #222; }
  .card .unit  { font-size: 11px; color: #888; margin-top: 2px; }

  .chart-section { margin-bottom: 24px; }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a3c6e;
    margin-bottom: 10px;
    padding-left: 4px;
    border-left: 3px solid #1a3c6e;
    padding-top: 2px;
    padding-bottom: 2px;
  }
  .chart-box {
    background: #fafbfc;
    border-radius: 10px;
    padding: 12px 8px;
    border: 1px solid #e8ecf1;
  }
  .chart-container { height: 400px; }

  .table-section { margin-bottom: 24px; }
  .table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    min-width: 700px;
  }
  thead th {
    background: #1a3c6e;
    color: #fff;
    padding: 10px 6px;
    font-weight: 600;
    font-size: 12px;
    line-height: 1.4;
    position: sticky;
    top: 0;
    z-index: 1;
  }
  tbody td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid #eee;
  }
  tbody td:first-child {
    text-align: left;
    font-weight: 600;
    padding-left: 12px;
    color: #1a3c6e;
  }
  tbody tr:hover { background: #f5f8fc; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:nth-child(even):hover { background: #f0f4fa; }
  .td-zero { color: #c0c4cc; }
  .td-high { color: #c0392b; font-weight: 700; }

  tfoot td {
    padding: 10px 6px;
    text-align: center;
    font-weight: 700;
    background: #eef3f8;
    border-top: 2px solid #1a3c6e;
    color: #1a3c6e;
  }
  tfoot td:first-child { padding-left: 12px; }

  .download-bar {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin: 20px 0;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 22px;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary { background: #1a3c6e; color: #fff; }
  .btn-primary:hover { background: #2d6bb0; }
  .btn-secondary { background: #f0f2f5; color: #333; border: 1px solid #ddd; }
  .btn-secondary:hover { background: #e4e7ed; }
  .note {
    text-align: center;
    font-size: 11px;
    color: #999;
    margin-top: 8px;
    padding-bottom: 20px;
  }

  /* ========== 响应式 ========== */
  @media (max-width: 1024px) {
    .summary-cards { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .chart-container { height: 350px; }
  }
  @media (max-width: 768px) {
    .card { padding: 12px 6px; }
    .card .value { font-size: 20px; }
    .card .label { font-size: 10px; }
    .chart-container { height: 360px; }

  }
  @media (max-width: 640px) {

    .header { padding: 18px 12px 14px; }

    .header .subtitle { font-size: 11px; }
    .version-btn { padding: 5px 10px; font-size: 11px; }

    .content { padding: 12px 10px; }
    .summary-cards { grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .card { padding: 10px 4px; border-radius: 6px; }
    .card::before { height: 2px; }
    .card .label { font-size: 10px; }
    .card .value { font-size: 18px; }
    .card .unit  { font-size: 10px; }
    .chart-container { height: 280px; }
    .chart-box { padding: 8px 4px; }
    .section-title { font-size: 14px; }
    table { font-size: 10px; min-width: 520px; }
    thead th { padding: 6px 3px; font-size: 10px; }
    tbody td { padding: 5px 3px; }
    tbody td:first-child { padding-left: 6px; }
    tfoot td:first-child { padding-left: 6px; }
    .btn { padding: 8px 14px; font-size: 12px; }
  }
  @media print {
    body { background: #fff; padding: 0; }
    .page-wrapper { box-shadow: none; }
    .download-bar { display: none; }
    .version-bar { display: none; }
  }
</style>
</head>

// =============================================
// 全局状态
// =============================================
let currentVersion = 'v1.0';
let lineChart = null;
let barChart = null;

// =============================================
// 工具函数
// =============================================
function sumArr(arr) { return arr.reduce((a,b)=>a+b,0); }
function fmtNum(n) {
  if (n === 0) return '0';
  if (n >= 100000) return (n/10000).toFixed(1) + '万';
  if (n >= 10000)  return (n/10000).toFixed(2) + '万';
  return n.toLocaleString();
}
function fmtFull(n) { return n === 0 ? '0' : n.toLocaleString(); }

// =============================================
// 渲染函数
// =============================================
function renderAll(verKey) {
  const ver = versions[verKey];
  const cols = ver.columns;
  const data = ver.data;

  // 更新标题区域
  document.getElementById('mainTitle').textContent = ver.title;
  document.getElementById('mainSubtitle').innerHTML = ver.subtitle;
  document.getElementById('sourceNote').textContent = ver.source;
  document.title = ver.title;

  // 提取各列数据数组
  const colData = {};
  cols.forEach(col => { colData[col.key] = data.map(r => r[col.key]); });
  const months = data.map(r => r.month);

  // --- 汇总卡片 ---
  const cardsDiv = document.getElementById('summaryCards');
  cardsDiv.innerHTML = '';
  cols.forEach(col => {
    const sum = sumArr(colData[col.key]);
    const card = document.createElement('div');
    card.className = 'card ' + col.cardClass;
    card.innerHTML = `
      <div class="label">${col.label}</div>
      <div class="value">${fmtNum(sum)}</div>
      <div class="unit">份</div>
    `;
    cardsDiv.appendChild(card);
  });

  // --- 表格 ---
  // 表头
  const thead = document.getElementById('tableHead');
  let headHtml = '<tr><th style="text-align:left;padding-left:12px;">月份</th>';
  cols.forEach(col => {
    headHtml += `<th>${col.shortLabel}</th>`;
  });
  headHtml += '</tr>';
  thead.innerHTML = headHtml;

  // 表体
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  data.forEach(row => {
    const vals = cols.map(col => row[col.key]);
    const maxV = Math.max(...vals);
    const tr = document.createElement('tr');
    let tds = `<td>${row.month}</td>`;
    vals.forEach(v => {
      let cls = '';
      if (v === 0) cls = 'td-zero';
      else if (v === maxV && maxV > 1000) cls = 'td-high';
      tds += `<td class="${cls}">${fmtFull(v)}</td>`;
    });
    tr.innerHTML = tds;
    tbody.appendChild(tr);
  });

  // 表尾合计
  const tfoot = document.getElementById('tableFoot');
  let footHtml = '<tr><td>合计</td>';
  cols.forEach(col => {
    const sum = sumArr(colData[col.key]);
    footHtml += `<td>${fmtFull(sum)}</td>`;
  });
  footHtml += '</tr>';
  tfoot.innerHTML = footHtml;

  // --- 销毁旧图表 ---
  if (lineChart) { lineChart.destroy(); lineChart = null; }
  if (barChart)  { barChart.destroy();  barChart = null; }

  // --- 折线图 ---
  const lineCtx = document.getElementById('lineChart').getContext('2d');
  const lineDatasets = cols.map(col => ({
    label: col.shortLabel,
    data: colData[col.key],
    borderColor: col.lineColor,
    backgroundColor: col.fillColor.replace(/[\d.]+\)$/, '0.07)'),
    borderWidth: (col.key === 'c' || col.key === 'd') ? 2.5 : 2,
    pointRadius: 3,
    pointHoverRadius: 5,
    tension: 0.2,
    fill: false,
  }));

  lineChart = new Chart(lineCtx, {
    type: 'line',
    data: { labels: months, datasets: lineDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            boxWidth: 20, padding: 10,
            font: { size: 11, family: "'Microsoft YaHei','PingFang SC',Arial" },
            usePointStyle: true,
            pointStyleWidth: 8,
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 份`
          }
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10 }, maxRotation: 60, autoSkip: false }
        },
        y: {
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 10 },
            callback: val => val >= 10000 ? (val/10000).toFixed(0)+'万' : val.toLocaleString()
          },
          beginAtZero: true
        }
      }
    }
  });

  // --- 堆积柱状图 ---
  const barCtx = document.getElementById('barChart').getContext('2d');
  const barDatasets = cols.map(col => ({
    label: col.shortLabel,
    data: colData[col.key],
    backgroundColor: col.fillColor,
  }));

  barChart = new Chart(barCtx, {
    type: 'bar',
    data: { labels: months, datasets: barDatasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            boxWidth: 14, padding: 10,
            font: { size: 11, family: "'Microsoft YaHei','PingFang SC',Arial" },
            usePointStyle: true,
            pointStyleWidth: 8,
          }
        },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()} 份`
          }
        }
      },
      scales: {
        x: {
          stacked: true,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10 }, maxRotation: 60, autoSkip: false }
        },
        y: {
          stacked: true,
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: {
            font: { size: 10 },
            callback: val => val >= 10000 ? (val/10000).toFixed(0)+'万' : val.toLocaleString()
          },
          beginAtZero: true
        }
      }
    }
  });
}

// =============================================
// 版本切换
// =============================================
function switchVersion(verKey) {
  if (verKey === currentVersion) return;
  currentVersion = verKey;

  // 更新按钮状态
  document.querySelectorAll('.version-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.ver === verKey);
  });

  renderAll(verKey);
}

// =============================================
// 下载功能
// =============================================
function downloadHTML() {
  const html = document.documentElement.outerHTML;
  const blob = new Blob(['<!DOCTYPE html>\n' + html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '法域智和数据情况总览.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

// =============================================
// 初始渲染
// =============================================
renderAll('v1.0');
</script>
</body>
</html>
